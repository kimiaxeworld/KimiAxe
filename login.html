.ci{font-size:1.4rem;margin-bottom:12px}
.ct{font-size:0.92rem;font-weight:700;margin-bottom:6px}
.cd{font-size:0.8rem;color:var(--m);line-height:1.7;margin-bottom:14px}

.cl:hover{border-color:var(--t)}
.sec{margin-bottom:52px}
.sl{font-family:'Geist Mono',monospace;font-size:0.65rem;color:var(--m);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.st{font-family:'Instrument Serif',serif;font-size:clamp(1.6rem,2.8vw,2.2rem);letter-spacing:-0.8px;margin-bottom:28px}

.fi{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:12px 15px;color:var(--t);font-size:0.87rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s}
.fi:focus{border-color:var(--bd2)}

textarea.fi{resize:vertical;min-height:120px}

.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.divl{display:flex;align-items:center;gap:14px;margin:44px 0}

.fi2{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.fc{font-size:0.72rem;color:var(--m)}
.flinks{display:flex;gap:18px;flex-wrap:wrap}
.flinks a{font-size:0.72rem;color:var(--m)}
