<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — KimiAxe</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--bg2:#0a0a0a;--bg3:#111;--bd:#222;--bd2:#333;--t:#fff;--m:#666;--m2:#999}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.gbg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--bd);position:relative;z-index:1}
.logo{font-family:'Geist Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--t);text-decoration:none}
.logo span{color:var(--m)}
.navr{font-size:0.82rem;color:var(--m)}
.navr a{color:var(--t);font-weight:600;text-decoration:none;margin-left:6px}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;z-index:1}
.box{width:100%;max-width:400px}
.bh{text-align:center;margin-bottom:32px}
.bicon{width:52px;height:52px;background:var(--t);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:1rem;font-weight:700;color:#000;margin:0 auto 16px}
.bt{font-family:'Instrument Serif',serif;font-size:1.9rem;letter-spacing:-1px;margin-bottom:6px}
.bt em{font-style:italic;color:var(--m)}
.bs{font-size:0.83rem;color:var(--m)}
.sbtns{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.sbtn{display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);font-size:0.83rem;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;color:var(--t);width:100%}
.sbtn:hover{border-color:var(--bd2);background:var(--bg3)}
.dv{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.dv::before,.dv::after{content:'';flex:1;height:1px;background:var(--bd)}
.dv span{font-size:0.68rem;color:var(--m);letter-spacing:2px;text-transform:uppercase;font-family:'Geist Mono',monospace}
.fg{margin-bottom:14px}
.fl{font-size:0.68rem;color:var(--m2);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:block;font-family:'Geist Mono',monospace}
.fi{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:12px 15px;color:var(--t);font-size:0.87rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s}
.fi:focus{border-color:var(--bd2)}
.fi::placeholder{color:var(--m)}
.ff{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.rem{display:flex;align-items:center;gap:7px;font-size:0.78rem;color:var(--m);cursor:pointer}
.rem input{accent-color:var(--t)}
.frg{font-size:0.78rem;color:var(--m);text-decoration:none}
.frg:hover{color:var(--t)}
.pbtn{width:100%;background:var(--t);color:#000;padding:13px;border-radius:8px;font-weight:700;font-size:0.9rem;border:none;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;margin-bottom:14px}
.pbtn:hover{background:#e5e5e5}
.pbtn:disabled{opacity:0.6;cursor:not-allowed}
.sl{text-align:center;font-size:0.8rem;color:var(--m)}
.sl a{color:var(--t);font-weight:600;text-decoration:none;margin-left:4px}
.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:11px 14px;font-size:0.8rem;color:#f87171;margin-bottom:14px;display:none}
.suc{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px;padding:11px 14px;font-size:0.8rem;color:#22c55e;margin-bottom:14px;display:none}
.plats{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:32px;padding-top:32px;border-top:1px solid var(--bd)}
.plat{font-size:0.68rem;color:var(--m);padding:4px 9px;border:1px solid var(--bd);border-radius:5px;font-family:'Geist Mono',monospace}
footer{text-align:center;padding:18px;border-top:1px solid var(--bd);position:relative;z-index:1}
footer a{color:var(--m);text-decoration:none;margin:0 8px;font-size:0.72rem}
footer a:hover{color:var(--t)}
</style>
</head>
<body>
<div class="gbg"></div>
<nav>
  <a href="index.html" class="logo">kimi<span>axe</span></a>
  <div class="navr">No account?<a href="register.html">Sign Up Free →</a></div>
</nav>
<main>
  <div class="box">
    <div class="bh">
      <div class="bicon">KA</div>
      <div class="bt">Welcome <em>back</em></div>
      <div class="bs">Sign in to access all 6 platforms</div>
    </div>
    <div class="sbtns">
      <button class="sbtn" onclick="loginTelegram()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="#229ED9"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-1.97 9.289c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.932z"/></svg>
        Continue with Telegram
      </button>
    </div>
    <div class="dv"><span>or with email</span></div>
    <div class="err" id="err"></div>
    <div class="suc" id="suc"></div>
    <div class="fg"><label class="fl">Email Address</label><input class="fi" type="email" id="email" placeholder="you@example.com"/></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="pass" placeholder="••••••••"/></div>
    <div class="ff">
      <label class="rem"><input type="checkbox" checked/> Remember me</label>
      <a href="#" class="frg" onclick="forgotPassword()">Forgot password?</a>
    </div>
    <button class="pbtn" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div class="sl">New to KimiAxe?<a href="register.html">Create free account</a></div>
    <div class="plats">
      <span class="plat">📱 AxeSMS</span><span class="plat">🔗 AxeXVX</span>
      <span class="plat">🤖 AxeB2B AI</span><span class="plat">💰 Wallet</span><span class="plat">📣 Socials</span>
    </div>
  </div>
</main>
<footer>
  <a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="#">Privacy</a><a href="#">Terms</a>
</footer>
<script>
const SUPA_URL = 'https://gjtmryogyqmztttwqcoq.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqdG1yeW9neXFtenR0dHdxY29xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MTQ5ODgsImV4cCI6MjA4ODE5MDk4OH0.XryBavcC8ErB8JYr7VedX-CsELTbX5FA1c71EiPH3EA';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// Check if already logged in
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='dashboard.html';
});

async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  const errEl=document.getElementById('err');
  const sucEl=document.getElementById('suc');
  const btn=document.getElementById('loginBtn');
  errEl.style.display='none'; sucEl.style.display='none';
  if(!email||!pass){errEl.textContent='Please enter email and password.';errEl.style.display='block';return}
  btn.textContent='Signing in...';btn.disabled=true;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){errEl.textContent=error.message;errEl.style.display='block';btn.textContent='Sign In →';btn.disabled=false;return}
  sucEl.textContent='✓ Login successful! Redirecting...';sucEl.style.display='block';
  setTimeout(()=>window.location.href='dashboard.html',1000);
}

async function forgotPassword(){
  const email=document.getElementById('email').value.trim();
  if(!email){alert('Please enter your email first');return}
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://kimiaxe.com/reset-password.html'});
  if(error){alert('Error: '+error.message);return}
  document.getElementById('suc').textContent='✓ Password reset email sent! Check your inbox.';
  document.getElementById('suc').style.display='block';
}

function loginTelegram(){window.open('https://t.me/KimiaxeBot?start=login','_blank')}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
</script>
</body>
</html>
